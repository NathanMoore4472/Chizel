<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Mono:wght@700&family=Syne:wght@800&display=swap');
      .label { font-family: sans-serif; font-size: 12px; fill: #888; }
    </style>
  </defs>

  <!-- LOGO 1: Sharp / geometric wordmark -->
  <rect x="40" y="40" width="600" height="220" rx="12" fill="#f5f5f3" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>

  <!-- Chisel blade icon -->
  <g transform="translate(80, 120)">
    <polygon points="0,0 28,0 34,60 -6,60" fill="#3C3489" />
    <polygon points="-6,60 34,60 28,80 0,80" fill="#7F77DD" />
    <rect x="4" y="-30" width="20" height="32" rx="3" fill="#B4B2A9"/>
    <rect x="2" y="-36" width="24" height="8" rx="2" fill="#888780"/>
  </g>

  <text x="140" y="148" font-family="'Syne', sans-serif" font-weight="800" font-size="62" letter-spacing="-2" fill="#26215C">chizel</text>
  <text x="141" y="178" font-family="sans-serif" font-weight="400" font-size="13" letter-spacing="3" fill="#7F77DD">VISUAL WEB BUILDER</text>
  <text x="340" y="272" text-anchor="middle" class="label">Variant A — Geometric wordmark</text>

  <!-- LOGO 2: Monogram mark + clean sans -->
  <rect x="40" y="300" width="600" height="220" rx="12" fill="#26215C"/>

  <g transform="translate(80, 380)">
    <rect x="0" y="0" width="60" height="60" rx="6" fill="none" stroke="#7F77DD" stroke-width="3"/>
    <text x="10" y="47" font-family="'Syne', sans-serif" font-weight="800" font-size="50" fill="#EEEDFE" letter-spacing="-2">C</text>
    <rect x="46" y="42" width="10" height="10" rx="2" fill="#AFA9EC"/>
  </g>

  <text x="165" y="425" font-family="'Syne', sans-serif" font-weight="800" font-size="58" letter-spacing="-1" fill="#EEEDFE">chizel</text>
  <text x="166" y="453" font-family="sans-serif" font-weight="400" font-size="12" letter-spacing="4" fill="#7F77DD">BUILD · DESIGN · DEPLOY</text>
  <text x="340" y="532" text-anchor="middle" class="label" fill="#888">Variant B — Dark badge with monogram</text>

  <!-- LOGO 3: Minimal sharp wedge icon -->
  <rect x="40" y="560" width="600" height="220" rx="12" fill="#f5f5f3" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>

  <g transform="translate(76, 620)">
    <polygon points="0,0 50,30 0,60" fill="#185FA5"/>
    <polygon points="0,0 50,30 30,30 0,18" fill="#85B7EB"/>
    <rect x="54" y="10" width="5" height="40" rx="2" fill="#378ADD"/>
  </g>

  <text x="160" y="666" font-family="'Space Mono', monospace" font-weight="700" font-size="52" letter-spacing="-3" fill="#042C53">chizel</text>
  <rect x="160" y="678" width="240" height="3" rx="1.5" fill="#85B7EB"/>
  <text x="340" y="790" text-anchor="middle" class="label">Variant C — Monospace cursor / developer feel</text>

</svg>
